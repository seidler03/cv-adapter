{% extends "base.html" %}
{% block title %}Sign Out{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center">
    <h1 class="text-2xl font-bold text-white mb-4">Sign out</h1>
    <p class="text-gray-400 mb-8">Are you sure you want to sign out?</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="bg-gradient-to-r from-indigo-500 to-purple-600 hover:brightness-110 text-white font-bold px-8 py-2.5 rounded-xl transition">Yes, sign out</button>
    </form>
    <div class="mt-4">
      <a href="{% url 'dashboard:index' %}" class="text-sm text-gray-400 hover:text-gray-200">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
