<!-- HTMX partial: add application form -->
<form method="post" action="{% url 'job_tracker:add' %}" class="space-y-4"
      hx-post="{% url 'job_tracker:add' %}"
      hx-target="body"
      hx-push-url="/tracker/">
  {% csrf_token %}
  {% for field in form %}
  <div>
    <label class="block text-sm font-medium text-gray-300 mb-1.5">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}<p class="mt-1 text-xs text-red-400">{{ field.errors|join:", " }}</p>{% endif %}
  </div>
  {% endfor %}
  <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:brightness-110 text-white font-bold py-3 rounded-xl transition">
    Save Application
  </button>
</form>
